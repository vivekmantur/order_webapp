name: Build and deploy Python app to Azure Web App - vivek-webapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'vivek-webapp'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DB8A07A8B71E40A4B8A5569397B6609B }}